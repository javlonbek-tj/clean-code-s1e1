<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:300,400,700" />
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8" />
  </head>
  <body>
    <header class="header">
      <img class="header__image" src="./eisenhower-matrix.jpg" alt="Eisenhower matrix" />
      <a class="header__link" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>
    <main class="main">
      <form class="task-form" id="task-form">
        <label class="task-form__label" for="new-task">Add Item</label>
        <div class="task-form__input-wrapper">
          <input id="new-task" class="task-form__input" type="text" />
          <button class="task-form__button">Add</button>
        </div>
      </form>
      <section class="task-list">
        <h2 class="task-list__title">Todo</h2>
        <ul class="task-list__items" id="incomplete-tasks">
          <li class="task-item">
            <input type="checkbox" class="task-item__checkbox" />
            <label class="task-item__label" class="task">Pay Bills</label>
            <input type="text" class="task-item__input" />
            <button class="task-item__button task-item__button_edit">Edit</button>
            <button class="task-item__button task-item__button_delete">
              <img src="./remove.svg" alt="Remove task" />
            </button>
          </li>
          <li class="task-item task-item_edit-mode">
            <input type="checkbox" class="task-item__checkbox" />
            <label class="task-item__label">Go Shopping</label>
            <input type="text" class="task-item__input" value="Go Shopping" />
            <button class="task-item__button task-item__button_edit">Save</button>
            <button class="task-item__button task-item__button_delete">
              <img src="./remove.svg" alt="Remove task" />
            </button>
          </li>
        </ul>
      </section>
      <section class="task-list">
        <h2 class="task-list__title">Completed</h2>
        <ul class="task-list__items task-list__items_completed" id="completed-tasks">
          <li class="task-item>
            <input type="checkbox" class="task-item__checkbox" checked />
            <label class="task-item__label">See the Doctor</label>
            <input type="text" class="task-item__input" />
            <button class="task-item__button task-item__button_edit">Edit</button>
            <button class="task-item__button task-item__button_delete">
              <img src="./remove.svg" alt="Remove task" />
            </button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
